<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedEngage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a2e;
      background: #f8f9fa;
    }
    .header {
      background: #4f46e5;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header span { font-size: 20px; }
    .body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    .status-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
    }
    .status-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .status-value { font-size: 13px; font-weight: 500; }

    .token-group { display: flex; flex-direction: column; gap: 6px; }
    .token-group label { font-size: 12px; color: #374151; font-weight: 500; }
    .token-group input {
      border: 1px solid #d1d5db;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 13px;
      width: 100%;
      outline: none;
    }
    .token-group input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary  { background: #4f46e5; color: white; }
    .btn-primary:hover:not(:disabled)  { opacity: 0.9; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .btn-secondary:hover:not(:disabled){ background: #e5e7eb; }

    .row { display: flex; gap: 8px; }
    .row .btn { flex: 1; }

    .error  { color: #dc2626; font-size: 12px; }
    .success{ color: #16a34a; font-size: 12px; }

    /* ── AI Preferences section ──────────────────────────────────────────── */
    .section-divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 2px 0;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #4f46e5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pref-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .pref-row label {
      font-size: 12px;
      color: #374151;
      font-weight: 500;
    }
    .pref-row select {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
      background: white;
      color: #1a1a2e;
    }
    .pref-row select:focus { border-color: #4f46e5; }

    /* Toggle switches */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-row label {
      font-size: 12px;
      color: #374151;
      font-weight: 500;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      appearance: none;
      background: #d1d5db;
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle:checked { background: #4f46e5; }
    .toggle::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle:checked::before { transform: translateX(16px); }

    .footer { text-align: center; font-size: 11px; color: #9ca3af; padding-bottom: 4px; }
    .footer a { color: #4f46e5; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <span>&#9889;</span>
    <h1>LinkedEngage</h1>
  </div>

  <div class="body">
    <div class="status-card">
      <div class="status-label">Worker Status</div>
      <div class="status-value" id="status">Loading...</div>
    </div>

    <div class="token-group">
      <label for="tokenInput">API Token (from Settings)</label>
      <input id="tokenInput" type="password" placeholder="Paste your token here..." />
    </div>

    <div id="message" style="min-height:16px;"></div>

    <div class="row">
      <button class="btn btn-primary"   id="saveBtn">Connect</button>
      <button class="btn btn-secondary" id="pollBtn">Poll Now</button>
    </div>

    <!-- AI Preferences -->
    <hr class="section-divider" />
    <div class="section-title">AI Comment Preferences</div>

    <div class="pref-row">
      <label for="aiLength">Length</label>
      <select id="aiLength">
        <option value="brief">Brief (1-2 sentences)</option>
        <option value="standard" selected>Standard (2-3 sentences)</option>
      </select>
    </div>

    <div class="pref-row">
      <label for="aiTone">Tone</label>
      <select id="aiTone">
        <option value="professional" selected>Professional</option>
        <option value="casual">Casual</option>
        <option value="witty">Witty</option>
        <option value="thoughtful">Thoughtful</option>
        <option value="supportive">Supportive</option>
      </select>
    </div>

    <div class="toggle-row">
      <label for="aiEmojis">Use Emojis</label>
      <input type="checkbox" id="aiEmojis" class="toggle" />
    </div>

    <div class="toggle-row">
      <label for="aiAskQuestion">End with a Question</label>
      <input type="checkbox" id="aiAskQuestion" class="toggle" />
    </div>
  </div>

  <div class="footer">
    <a href="http://localhost:3000/settings" target="_blank">Open Dashboard &#x2197;</a>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
